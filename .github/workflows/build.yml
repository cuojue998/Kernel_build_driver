name: Build Kernel Module (Official Config)

on:
  workflow_dispatch:          # 手动触发
  push:                       # 推送触发
    branches: [ main, master ]
    paths:
      - 'codex/**'            # 只在驱动源码变更时触发
  pull_request:               # PR 触发
    branches: [ main, master ]
    paths:
      - 'codex/**'

env:
  KERNEL_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
  KERNEL_BRANCH: camellia-r-oss
  ARCH: arm64
  # 根据官方 build.config 固定的工具链版本
  CLANG_VERSION: clang-r383902
  GCC_VERSION: aarch64-linux-android-4.9
  # 官方编译参数
  CLANG_TRIPLE: aarch64-linux-gnu-
  CROSS_COMPILE_PREFIX: aarch64-linux-androidkernel-
  DRIVER_DIR: codex

jobs:
  build-kernel-module:
    runs-on: ubuntu-22.04

    steps:
      # 1. 检出驱动仓库
      - name: Checkout driver repo
        uses: actions/checkout@v4

      # 2. 安装构建依赖
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git make flex bison bc \
            libssl-dev libelf-dev \
            libncurses-dev python3 wget

      # 3. 下载 Clang 预编译工具链
      - name: Download AOSP Clang toolchain
        run: |
          mkdir -p ~/toolchains
          cd ~/toolchains
          echo "Cloning ${CLANG_VERSION}..."
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b ${CLANG_VERSION}
          echo "CLANG_DIR=${HOME}/toolchains/${CLANG_VERSION}" >> $GITHUB_ENV

      # 4. 下载 GCC 交叉编译工具链 (官方配置要求)
      - name: Download GCC cross-compiler
        run: |
          mkdir -p ~/toolchains
          cd ~/toolchains
          echo "Cloning ${GCC_VERSION}..."
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/${GCC_VERSION}
          echo "GCC_DIR=${HOME}/toolchains/${GCC_VERSION}" >> $GITHUB_ENV

      # 5. 设置完整的工具链路径
      - name: Set toolchain paths
        run: |
          # Clang/LLVM 工具路径
          echo "CLANG=${CLANG_DIR}/bin/clang" >> $GITHUB_ENV
          echo "LD_LLD=${CLANG_DIR}/bin/ld.lld" >> $GITHUB_ENV
          echo "LLVM_AR=${CLANG_DIR}/bin/llvm-ar" >> $GITHUB_ENV
          echo "LLVM_NM=${CLANG_DIR}/bin/llvm-nm" >> $GITHUB_ENV
          echo "LLVM_STRIP=${CLANG_DIR}/bin/llvm-strip" >> $GITHUB_ENV
          echo "LLVM_OBJCOPY=${CLANG_DIR}/bin/llvm-objcopy" >> $GITHUB_ENV
          
          # CROSS_COMPILE 需要指向 GCC bin 目录下的前缀文件
          echo "CROSS_COMPILE=${GCC_DIR}/bin/${CROSS_COMPILE_PREFIX}" >> $GITHUB_ENV
          
          # 将 GCC 的路径也加入 PATH，以便于某些编译脚本查找
          echo "${GCC_DIR}/bin" >> $GITHUB_PATH

      # 6. 验证工具链是否就绪
      - name: Verify toolchain
        run: |
          echo "=== Clang ==="
          ${CLANG} --version || { echo "ERROR: Clang missing!"; exit 1; }
          echo ""
          echo "=== LLD ==="
          ${LD_LLD} --version || echo "WARNING: ld.lld not found, will try system linker."
          echo ""
          echo "=== GCC Cross-Compiler ==="
          ${CROSS_COMPILE}gcc --version || { echo "ERROR: GCC cross-compiler missing!"; exit 1; }
          echo ""
          echo "=== Validating aarch64 target ==="
          ${CLANG} -print-targets | grep aarch64 || echo "WARNING: aarch64 target not found!"

      # 7. 克隆内核源码
      - name: Clone kernel source
        run: |
          echo "Cloning kernel branch: ${KERNEL_BRANCH}..."
          git clone --depth=1 ${KERNEL_REPO} -b ${KERNEL_BRANCH} kernel
          echo "KERNEL_DIR=${GITHUB_WORKSPACE}/kernel" >> $GITHUB_ENV

      # 8. 配置内核
      - name: Configure kernel
        working-directory: kernel
        run: |
          # 你可以根据需要修改 DEFCONFIG，这里从你之前的信息假设为 camellia_defconfig
          DEFCONFIG="camellia_defconfig"
          if [ -f arch/${ARCH}/configs/${DEFCONFIG} ]; then
            echo "Using defconfig: ${DEFCONFIG}"
            make O=out ARCH=${ARCH} ${DEFCONFIG}
          else
            echo "ERROR: Defconfig '${DEFCONFIG}' not found!"
            echo "Available defconfigs:"
            ls arch/${ARCH}/configs/ | grep -i camellia || ls arch/${ARCH}/configs/
            exit 1
          fi

      # 9. 准备模块编译环境
      - name: Prepare kernel headers
        working-directory: kernel
        run: |
          make O=out ARCH=${ARCH} \
            CC=${CLANG} \
            LD=${LD_LLD} \
            LLVM=1 \
            LLVM_IAS=1 \
            CLANG_TRIPLE=${CLANG_TRIPLE} \
            CROSS_COMPILE=${CROSS_COMPILE} \
            modules_prepare

      # 10. 编译内核模块 (完全参照官方配置)
      - name: Build kernel module
        working-directory: ${GITHUB_WORKSPACE}
        run: |
          make \
            -C ${KERNEL_DIR} \
            M=${GITHUB_WORKSPACE}/${DRIVER_DIR} \
            ARCH=${ARCH} \
            CC=${CLANG} \
            LD=${LD_LLD} \
            AR=${LLVM_AR} \
            NM=${LLVM_NM} \
            STRIP=${LLVM_STRIP} \
            OBJCOPY=${LLVM_OBJCOPY} \
            LLVM=1 \
            LLVM_IAS=1 \
            CLANG_TRIPLE=${CLANG_TRIPLE} \
            CROSS_COMPILE=${CROSS_COMPILE} \
            O=${KERNEL_DIR}/out \
            modules

      # 11. 验证生成的 .ko 文件
      - name: Verify .ko output
        run: |
          echo "=== Searching for .ko files ==="
          KO_FILES=$(find ${GITHUB_WORKSPACE}/${DRIVER_DIR} -name "*.ko" -type f)
          if [ -z "$KO_FILES" ]; then
            echo "ERROR: No .ko files found! Build may have failed silently."
            exit 1
          fi
          echo "$KO_FILES"
          echo ""
          echo "=== Module file info ==="
          find ${GITHUB_WORKSPACE}/${DRIVER_DIR} -name "*.ko" -exec file {} \;

      # 12. 上传驱动作为构建产物
      - name: Upload kernel module artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-module-${CLANG_VERSION}
          path: ${{ env.DRIVER_DIR }}/**/*.ko
          if-no-files-found: error
          retention-days: 90
