name: Build Kernel Module (Clang)

on:
  workflow_dispatch:          # 手动触发
  push:                       # 推送触发
    branches: [ main, master ]
    paths:
      - 'codex/**'            # 只在驱动源码变更时触发
  pull_request:               # PR 触发
    branches: [ main, master ]
    paths:
      - 'codex/**'

env:
  KERNEL_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
  KERNEL_BRANCH: camellia-r-oss
  DEFCONFIG: camellia_defconfig          # 需要确认
  ARCH: arm64
  CLANG_PREBUILT_URL: https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86
  CLANG_VERSION: clang-r416183b                # 需要确认
  DRIVER_DIR: codex                      # 驱动源码目录

jobs:
  build-kernel-module:
    runs-on: ubuntu-22.04

    steps:
      # 1. 检出驱动仓库
      - name: Checkout driver repo
        uses: actions/checkout@v4

      # 2. 安装构建依赖
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git make flex bison bc \
            libssl-dev libelf-dev \
            libncurses-dev python3

      # 3. 下载 Clang 预编译工具链
      - name: Download AOSP Clang toolchain
        run: |
          mkdir -p ~/toolchains
          cd ~/toolchains
          git clone --depth=1 ${CLANG_PREBUILT_URL} -b ${CLANG_VERSION} clang-${CLANG_VERSION}

      # 4. 配置 PATH
      - name: Set up PATH
        run: |
          CLANG_PATH="${HOME}/toolchains/clang-${CLANG_VERSION}/bin"
          echo "${CLANG_PATH}" >> $GITHUB_PATH
          echo "CLANG_PATH=${CLANG_PATH}" >> $GITHUB_ENV

      # 5. 验证 Clang 工具链
      - name: Verify Clang toolchain
        run: |
          which clang
          clang --version
          which ld.lld
          ld.lld --version

      # 6. 克隆内核源码
      - name: Clone kernel source
        run: |
          git clone --depth=1 ${KERNEL_REPO} -b ${KERNEL_BRANCH} kernel
          echo "KERNEL_DIR=${GITHUB_WORKSPACE}/kernel" >> $GITHUB_ENV

      # 7. 配置内核
      - name: Configure kernel
        working-directory: kernel
        run: |
          make O=out ARCH=${ARCH} ${DEFCONFIG}
          # 如果 defconfig 名不确定，可以尝试：
          # make ARCH=${ARCH} LLVM=1 ${DEFCONFIG}

      # 8. 准备模块编译需要的头文件
      - name: Prepare kernel headers
        working-directory: kernel
        run: |
          make O=out ARCH=${ARCH} modules_prepare

      # 9. 编译内核模块
      - name: Build kernel module
        working-directory: ${GITHUB_WORKSPACE}
        run: |
          make \
            -C ${KERNEL_DIR} \
            M=${GITHUB_WORKSPACE}/${DRIVER_DIR} \
            ARCH=${ARCH} \
            CC=clang \
            LD=ld.lld \
            LLVM=1 \
            O=${KERNEL_DIR}/out \
            modules

      # 10. 验证生成的 .ko 文件
      - name: Verify .ko output
        run: |
          echo "=== Checking for .ko files ==="
          find ${GITHUB_WORKSPACE}/${DRIVER_DIR} -name "*.ko" -type f
          echo "=== Module info ==="
          find ${GITHUB_WORKSPACE}/${DRIVER_DIR} -name "*.ko" -exec file {} \;

      # 11. 上传驱动作为构建产物
      - name: Upload kernel module artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-module
          path: ${{ env.DRIVER_DIR }}/**/*.ko
          if-no-files-found: error
          retention-days: 90
