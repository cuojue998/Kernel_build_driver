name: Build Kernel Module (Clang)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'codex/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'codex/**'

env:
  KERNEL_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
  KERNEL_BRANCH: camellia-r-oss
  DEFCONFIG: camellia_defconfig
  ARCH: arm64
  CLANG_PREBUILT_URL: https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86
  CLANG_VERSION: llvm-r522817
  DRIVER_DIR: codex

jobs:
  build-kernel-module:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout driver repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git make flex bison bc \
            libssl-dev libelf-dev \
            libncurses-dev python3

      # 修正1：仓库克隆后的目录名就是“版本号”，不加“clang-”前缀
      - name: Download AOSP Clang toolchain
        run: |
          mkdir -p ~/toolchains
          cd ~/toolchains
          # 这里 -b 后跟的是完整分支名，如 clang-r522817
          # 克隆下来的文件夹名就是 clang-r522817（没有多余的 clang- 前缀）
          git clone --depth=1 ${CLANG_PREBUILT_URL} -b ${CLANG_VERSION}

      # 修正2：PATH 和 CLANG_PATH 必须指向实际的目录名
      - name: Set up PATH
        run: |
          # 实际克隆下来的目录名就是 ${CLANG_VERSION}，例如 clang-r522817
          CLANG_PATH="${HOME}/toolchains/${CLANG_VERSION}/bin"
          echo "${CLANG_PATH}" >> $GITHUB_PATH
          echo "CLANG_PATH=${CLANG_PATH}" >> $GITHUB_ENV

      - name: Verify Clang toolchain
        run: |
          which clang
          clang --version
          which ld.lld
          ld.lld --version

      - name: Clone kernel source
        run: |
          git clone --depth=1 ${KERNEL_REPO} -b ${KERNEL_BRANCH} kernel
          echo "KERNEL_DIR=${GITHUB_WORKSPACE}/kernel" >> $GITHUB_ENV

      - name: Configure kernel
        working-directory: kernel
        run: |
          make O=out ARCH=${ARCH} ${DEFCONFIG}

      - name: Prepare kernel headers
        working-directory: kernel
        run: |
          make O=out ARCH=${ARCH} modules_prepare

      # 修正3：编译阶段必须添加 LLVM 工具链参数以避免链接器不匹配
      - name: Build kernel module
        working-directory: ${GITHUB_WORKSPACE}
        run: |
          make \
            -C ${KERNEL_DIR} \
            M=${GITHUB_WORKSPACE}/${DRIVER_DIR} \
            ARCH=${ARCH} \
            CC=clang \
            LD=ld.lld \
            LLVM=1 \
            LLVM_IAS=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            O=${KERNEL_DIR}/out \
            modules

      - name: Verify .ko output
        run: |
          echo "=== Checking for .ko files ==="
          find ${GITHUB_WORKSPACE}/${DRIVER_DIR} -name "*.ko" -type f
          echo "=== Module info ==="
          find ${GITHUB_WORKSPACE}/${DRIVER_DIR} -name "*.ko" -exec file {} \;

      - name: Upload kernel module artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-module
          path: ${{ env.DRIVER_DIR }}/**/*.ko
          if-no-files-found: error
          retention-days: 90
