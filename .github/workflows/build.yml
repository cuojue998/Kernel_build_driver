name: Build Xiaomi Kernel Module with Clang

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout 你的仓库（包含codex文件夹）
      uses: actions/checkout@v4

    - name: 克隆小米内核源码
      run: |
        git clone --depth 1 --branch camellia-r-oss \
          https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git kernel

    - name: 安装Clang/LLVM工具链
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-14 lld-14 llvm-14
        sudo ln -sf /usr/bin/clang-14 /usr/bin/clang
        sudo ln -sf /usr/bin/clang++-14 /usr/bin/clang++
        sudo ln -sf /usr/bin/ld.lld-14 /usr/bin/ld.lld
        sudo ln -sf /usr/bin/llvm-ar-14 /usr/bin/llvm-ar
        sudo ln -sf /usr/bin/llvm-nm-14 /usr/bin/llvm-nm
        sudo ln -sf /usr/bin/llvm-objcopy-14 /usr/bin/llvm-objcopy
        sudo ln -sf /usr/bin/llvm-strip-14 /usr/bin/llvm-strip

    - name: 安装内核编译依赖
      run: |
        sudo apt-get install -y \
          flex bison libelf-dev libssl-dev \
          bc kmod cpio rsync \
          gcc-aarch64-linux-gnu \
          device-tree-compiler \
          python3 python3-dev

    - name: 配置内核
      working-directory: ./kernel
      run: |
        if [ -f arch/arm64/configs/camellia_defconfig ]; then
          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- camellia_defconfig
        else
          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- defconfig
        fi
        scripts/config --enable CONFIG_MODULES
        scripts/config --enable CONFIG_MODULE_UNLOAD
        scripts/config --enable CONFIG_KALLSYMS
        scripts/config --enable CONFIG_KALLSYMS_ALL

    - name: 准备内核模块构建环境
      working-directory: ./kernel
      run: |
        make -j$(nproc) ARCH=arm64 CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LD=ld.lld AR=llvm-ar NM=llvm-nm \
          STRIP=llvm-strip OBJCOPY=llvm-objcopy \
          modules_prepare
        make -j$(nproc) ARCH=arm64 CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          Image

    - name: 编译codex驱动模块
      working-directory: ./codex
      run: |
        export KERNELDIR=$(pwd)/../kernel
        export ARCH=arm64
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export STRIP=llvm-strip
        
        if [ ! -f Makefile ]; then
          SOURCES=$(ls *.c 2>/dev/null)
          if [ -z "$SOURCES" ]; then
            echo "错误: 找不到任何.c源文件"
            exit 1
          fi
          
          MODULE_NAME=$(echo $SOURCES | awk '{print $1}' | sed 's/\.c$//')
          
          OBJS_LIST=""
          for src in $SOURCES; do
            OBJS_LIST="$OBJS_LIST $(basename $src .c).o"
          done
          
          cat > Makefile << "EOF"
obj-m := MODULE_NAME_PLACEHOLDER.o
MODULE_NAME_PLACEHOLDER-objs := OBJS_LIST_PLACEHOLDER

KERNELDIR ?= /lib/modules/$(shell uname -r)/build
PWD := $(shell pwd)

default:
	$(MAKE) ARCH=$(ARCH) CC=$(CC) CLANG_TRIPLE=$(CLANG_TRIPLE) \
	         CROSS_COMPILE=$(CROSS_COMPILE) LD=$(LD) AR=$(AR) \
	         -C $(KERNELDIR) M=$(PWD) modules

clean:
	$(MAKE) -C $(KERNELDIR) M=$(PWD) clean
EOF
          sed -i "s/MODULE_NAME_PLACEHOLDER/$MODULE_NAME/g" Makefile
          sed -i "s/OBJS_LIST_PLACEHOLDER/$OBJS_LIST/g" Makefile
        fi
        
        make -j$(nproc) KERNELDIR=$KERNELDIR \
          ARCH=$ARCH CC=$CC CLANG_TRIPLE=$CLANG_TRIPLE \
          CROSS_COMPILE=$CROSS_COMPILE LD=$LD AR=$AR \
          NM=$NM STRIP=$STRIP
        
        echo "=== 编译完成的KO文件 ==="
        ls -lh *.ko 2>/dev/null || echo "未找到KO文件"
        
        if ls *.ko 1>/dev/null 2>&1; then
          for ko in *.ko; do
            echo "--- $ko 信息 ---"
            modinfo $ko 2>/dev/null || true
          done
        fi

    - name: 上传编译好的驱动模块
      uses: actions/upload-artifact@v4
      with:
        name: xiaomi-kernel-module
        path: codex/*.ko
        if-no-files-found: error

    - name: 上传编译日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          kernel/.config
          codex/*.log
        retention-days: 7
