name: Build Xiaomi Kernel Module with Clang

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4

    - name: Clone Xiaomi kernel source
      run: |
        git clone --depth 1 --branch camellia-r-oss \
          https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git kernel

    - name: Install Clang/LLVM toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-14 lld-14 llvm-14
        sudo ln -sf /usr/bin/clang-14 /usr/bin/clang
        sudo ln -sf /usr/bin/clang++-14 /usr/bin/clang++
        sudo ln -sf /usr/bin/ld.lld-14 /usr/bin/ld.lld
        sudo ln -sf /usr/bin/llvm-ar-14 /usr/bin/llvm-ar
        sudo ln -sf /usr/bin/llvm-nm-14 /usr/bin/llvm-nm
        sudo ln -sf /usr/bin/llvm-objcopy-14 /usr/bin/llvm-objcopy
        sudo ln -sf /usr/bin/llvm-strip-14 /usr/bin/llvm-strip

    - name: Install kernel build dependencies
      run: |
        sudo apt-get install -y \
          flex bison libelf-dev libssl-dev \
          bc kmod cpio rsync \
          gcc-aarch64-linux-gnu \
          device-tree-compiler \
          python3 python3-dev

    - name: Configure kernel
      working-directory: ./kernel
      run: |
        export ARCH=arm64
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-
        
        if [ -f arch/arm64/configs/camellia_defconfig ]; then
          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- camellia_defconfig
        else
          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- defconfig
        fi
        
        scripts/config --enable CONFIG_MODULES
        scripts/config --enable CONFIG_MODULE_UNLOAD
        scripts/config --enable CONFIG_KALLSYMS
        scripts/config --enable CONFIG_KALLSYMS_ALL
        scripts/config --enable CONFIG_MODVERSIONS
        
        make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

    - name: Prepare kernel module build environment
      working-directory: ./kernel
      run: |
        make -j$(nproc) ARCH=arm64 CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LD=ld.lld AR=llvm-ar NM=llvm-nm \
          STRIP=llvm-strip OBJCOPY=llvm-objcopy \
          modules_prepare

    - name: Compile codex driver module
      working-directory: ./codex
      run: |
        export KERNELDIR=$(realpath ../kernel)
        export ARCH=arm64
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export STRIP=llvm-strip
        
        echo "Current directory: $(pwd)"
        echo "Kernel directory: $KERNELDIR"
        ls -la *.c 2>/dev/null || echo "No .c files found"
        
        if [ ! -f Makefile ]; then
          SOURCES=$(ls *.c 2>/dev/null)
          if [ -z "$SOURCES" ]; then
            echo "Error: No .c source files found"
            exit 1
          fi
          
          MODULE_NAME=$(echo $SOURCES | awk '{print $1}' | sed 's/\.c$//')
          
          OBJS_LIST=""
          for src in $SOURCES; do
            OBJS_LIST="$OBJS_LIST $(basename $src .c).o"
          done
          
          cat > Makefile << 'MAKEFILE_END'
obj-m := MODULE_PLACEHOLDER.o
MODULE_PLACEHOLDER-objs := OBJS_PLACEHOLDER

KERNELDIR ?= /lib/modules/$(shell uname -r)/build
PWD := $(shell pwd)

default:
	$(MAKE) ARCH=$(ARCH) CC=$(CC) CLANG_TRIPLE=$(CLANG_TRIPLE) \
		CROSS_COMPILE=$(CROSS_COMPILE) LD=$(LD) AR=$(AR) \
		NM=$(NM) STRIP=$(STRIP) \
		-C $(KERNELDIR) M=$(PWD) modules

clean:
	$(MAKE) -C $(KERNELDIR) M=$(PWD) clean
MAKEFILE_END
          
          sed -i "s/MODULE_PLACEHOLDER/$MODULE_NAME/g" Makefile
          sed -i "s/OBJS_PLACEHOLDER/$OBJS_LIST/g" Makefile
          
          echo "Generated Makefile:"
          cat Makefile
        fi
        
        make -j$(nproc) KERNELDIR=$KERNELDIR \
          ARCH=$ARCH CC=$CC CLANG_TRIPLE=$CLANG_TRIPLE \
          CROSS_COMPILE=$CROSS_COMPILE LD=$LD AR=$AR \
          NM=$NM STRIP=$STRIP
        
        echo "Build results:"
        ls -lh *.ko 2>/dev/null || echo "No .ko files found"
        
        if ls *.ko 1>/dev/null 2>&1; then
          for ko in *.ko; do
            echo "Module info for $ko:"
            modinfo $ko 2>/dev/null || true
          done
        fi

    - name: Upload compiled driver modules
      uses: actions/upload-artifact@v4
      with:
        name: xiaomi-kernel-module
        path: codex/*.ko
        if-no-files-found: error

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          kernel/.config
          codex/*.log
        retention-days: 7
